experiment_id: D008
panels:
- research_input_data/inputs/equity_panels/kiwoom_dynamic_top100_2010_2016_panel.csv
- research_input_data/inputs/equity_panels/dynamic_top100_2017_2024_panel.csv
- research_input_data/inputs/equity_panels/dynamic_top100_2018_2024_panel.csv
- research_input_data/inputs/equity_panels/dynamic_top100_2025_2026_krx_panel.csv
panel_date_filters:
  research_input_data/inputs/equity_panels/dynamic_top100_2017_2024_panel.csv:
    end: 2017-12-31
market_breadth_csv: research_input_data/inputs/macro_features/krx_market_breadth_kospi_2010_2026.csv
macro_data_dir: research_input_data/inputs/macro_features
period:
  start: &id001 2015-01-01
  end: &id002 2021-12-31
  exclude_calendar_years:
  - 2016
universe:
  require_dynamic_top100: true
  min_avg_traded_value_20d: 5000000000
  exclude_estimated_flag_rows: true
strategy:
  lookback: 5
  max_positions: 5
regime:
  aggregation: factor_z_score
  z_score_window_months: 60
  on_threshold: 0.0
  blocks:
  - name: global_risk
    vars:
    - name: vix_60d_vs_240d
      sign: -1
  - name: usd_fx
    vars:
    - name: usdkrw_yoy
      sign: -1
    - name: dxy_yoy
      sign: -1
  - name: us_rates
    vars:
    - name: us_2_10_curve
      sign: 1
  - name: inflation
    vars:
    - name: us_cpi_decel
      sign: -1
    - name: us_ppi_decel
      sign: -1
  - name: commodity
    vars:
    - name: brent_yoy
      sign: -1
  - name: korea
    vars:
    - name: kr10y_yoy_change
      sign: -1
selection:
  type: market_cap_top_n
  n: 5
rebalance:
  frequency: quarterly
  anchor: last_trading_day
costs:
  commission_bps: 1.5
  tax_bps_sell: 20.0
  slippage_bps: 5.0
variants:
- factor_macro_gate_mcap
- kospi_buy_and_hold
- cash
output_dir: reports/experiments/D008_oos_subperiod_split/scheme_c_is
subperiod:
  name: scheme_c_is
  start: *id001
  end: *id002
